onboarding = false

[theme]
name = "tokyo-night-day"
auto_switch = false

[keys]
prefix = "ctrl+a"
detach = ["prefix+q", "prefix+d"]
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_horizontal = ["prefix+double_quote", "prefix+minus"]
split_vertical = ["prefix+percent", "prefix+shift+minus"]
new_tab = "prefix+c"
rename_tab = ["prefix+shift+t", "prefix+comma"]
previous_tab = ["prefix+p", "prefix+ctrl+h"]
next_tab = ["prefix+n", "prefix+ctrl+l"]
switch_tab = "prefix+1..9"
close_tab = "prefix+ampersand"
cycle_pane_next = "prefix+o"
last_pane = "prefix+semicolon"
close_pane = "prefix+x"
zoom = ["prefix+z", "prefix+plus"]
resize_mode = "prefix+r"
workspace_picker = "prefix+w"
goto = "prefix+g"
copy_mode = ["prefix+[", "prefix+enter"]

[ui]
agent_panel_sort = "spaces"
